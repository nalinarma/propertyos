<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #ffffff;
  --surface: #ffffff;
  --surface2: #f4f3f0;
  --surface3: #ebebeb;
  --border: #e0ddd6;
  --gold: #c9a84c;
  --gold2: #b8954a;
  --text: #1a1916;
  --muted: #7a7670;
  --green: #16a34a;
  --blue: #2563eb;
  --yellow: #d97706;
  --grey: #6b7280;
  --red: #dc2626;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: 'Source Sans 3', sans-serif; font-size: 14px; }

/* ── LAYOUT ── */
.app { display: flex; flex-direction: column; height: 100vh; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
  height: 56px;
  flex-shrink: 0;
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: .04em;
  margin-right: 32px;
  flex-shrink: 0;
}

/* ── MAIN TABS ── */
.main-tabs { display: flex; gap: 2px; }
.main-tab {
  padding: 0 20px;
  height: 56px;
  border: none;
  background: none;
  color: var(--muted);
  font-family: 'Source Sans 3', sans-serif;
  font-size: .88rem;
  font-weight: 600;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all .15s;
  letter-spacing: .03em;
  text-transform: uppercase;
}
.main-tab:hover { color: var(--text); }
.main-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

.topbar-right { margin-left: auto; display: flex; gap: 8px; }

/* ── CONTENT ── */
.content { flex: 1; overflow-y: auto; padding: 24px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── YEAR TABS ── */
.year-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.year-btn {
  padding: 7px 18px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--muted);
  font-family: 'Source Sans 3', sans-serif; font-size: .82rem; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.year-btn:hover { border-color: var(--gold); color: var(--text); }
.year-btn.active { background: var(--gold); color: #111; border-color: var(--gold); }
.add-year-btn {
  padding: 7px 14px; border-radius: 8px; border: 1px dashed var(--border);
  background: none; color: var(--muted); cursor: pointer;
  font-size: .82rem; font-family: 'Source Sans 3', sans-serif;
  transition: all .15s;
}
.add-year-btn:hover { border-color: var(--gold); color: var(--gold); }

/* ── BUTTONS ── */
.btn {
  border: none; border-radius: 8px; cursor: pointer;
  font-family: 'Source Sans 3', sans-serif; font-weight: 600;
  font-size: .82rem; padding: 8px 16px;
  transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-gold { background: var(--gold); color: #111; }
.btn-gold:hover { background: var(--gold2); }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
.btn-danger { background: rgba(224,92,92,.12); color: var(--red); border: 1px solid rgba(224,92,92,.2); }
.btn-sm { padding: 5px 10px; font-size: .75rem; }

/* ── CARDS ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }

/* ── FORMS / MODALS ── */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-bg.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px; padding: 28px; width: 95%; max-width: 720px;
  max-height: 92vh; overflow-y: auto;
  transform: translateY(20px); transition: transform .2s;
}
.modal-bg.open .modal { transform: translateY(0); }
.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem; color: var(--gold); margin-bottom: 20px;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: span 2; }
.form-group.third { grid-column: span 1; }
label { font-size: .7rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .07em; }
input, select, textarea {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: 'Source Sans 3', sans-serif;
  font-size: .88rem; padding: 8px 12px; outline: none; transition: border-color .15s; width: 100%;
}
input:focus, select:focus, textarea:focus { border-color: var(--gold); }
select option { background: var(--surface2); }
textarea { resize: vertical; min-height: 60px; }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.form-section { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: var(--gold); margin: 16px 0 8px; grid-column: span 2; border-bottom: 1px solid var(--border); padding-bottom: 6px; }

/* ── STATUS COLORS ── */
.status-in-process   { background: rgba(0,0,0,.06); color: #555; border: 1px solid rgba(0,0,0,.12); }
.status-op-pending   { background: #fef08a; color: #713f12; border: 1px solid #fde047; }
.status-deal-close   { background: rgba(37,99,235,.1); color: var(--blue); border: 1px solid rgba(37,99,235,.25); }
.status-dead-deal    { background: rgba(107,114,128,.1); color: var(--grey); border: 1px solid rgba(107,114,128,.2); }
.status-done-pay     { background: rgba(22,163,74,.1); color: var(--green); border: 1px solid rgba(22,163,74,.25); }
.status-pill {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: .7rem; font-weight: 700; white-space: nowrap;
}

/* ── DEAL TABLE ── */
.deal-section { margin-bottom: 28px; }
.month-title {
  font-family: 'Playfair Display', serif;
  font-size: 1rem; color: var(--gold2);
  margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: .82rem; }
th {
  text-align: left; font-size: .65rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: .08em;
  padding: 8px 10px; border-bottom: 1px solid var(--border);
  white-space: nowrap; background: var(--surface2); font-weight: 600; color: var(--text);
}
td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; white-space: nowrap; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }
.deal-row { cursor: pointer; }

/* ── EXPENSE GRID ── */
/* Expense table - categories on left, months across top, total on right */
.exp-table {
  width: 100%;
  border-collapse: collapse;
  font-size: .82rem;
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
}
.exp-table th {
  background: var(--surface2);
  padding: 9px 12px;
  font-size: .65rem; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: .07em;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  text-align: center; white-space: nowrap;
}
.exp-table th:first-child { text-align: left; min-width: 160px; }
.exp-table th:last-child { color: var(--gold); border-right: none; }
.exp-cat-cell {
  padding: 7px 14px;
  font-weight: 600; color: var(--text);
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  background: var(--surface2);
  white-space: nowrap;
}
.exp-input-cell {
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 0; min-width: 78px;
}
.exp-input-cell input {
  width: 100%; padding: 7px 8px;
  background: transparent; border: none;
  color: var(--text); font-size: .8rem; text-align: right;
  font-family: 'Source Sans 3', sans-serif; outline: none;
}
.exp-input-cell input:focus { background: rgba(201,168,76,.07); }
.exp-row-total {
  padding: 7px 12px;
  font-weight: 700; color: var(--green);
  text-align: right; white-space: nowrap;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.exp-footer-label {
  padding: 10px 14px;
  font-family: 'Playfair Display', serif;
  font-weight: 700; color: var(--gold);
  border-right: 1px solid var(--border);
  border-top: 2px solid var(--border);
  background: var(--surface2);
}
.exp-col-total {
  padding: 10px 8px;
  font-weight: 700; color: var(--gold2);
  text-align: right; white-space: nowrap;
  border-right: 1px solid var(--border);
  border-top: 2px solid var(--border);
  background: var(--surface2);
  font-size: .82rem;
}
.exp-grand-cell {
  padding: 10px 12px;
  font-weight: 700; color: var(--gold);
  text-align: right;
  border-top: 2px solid var(--border);
  background: var(--surface2);
  font-size: .9rem;
}
/* Expense notes rows */
.exp-note-row { background: rgba(201,168,76,.03); }
.exp-note-label {
  padding: 3px 14px 5px 22px;
  font-size: .68rem; color: var(--muted);
  font-style: italic;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  background: rgba(201,168,76,.04);
  white-space: nowrap;
}
.exp-note-cell {
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 0; min-width: 78px;
}
.exp-note-cell input {
  width: 100%; padding: 3px 8px 4px;
  background: transparent; border: none;
  color: var(--muted); font-size: .72rem;
  font-style: italic; text-align: left;
  font-family: 'Source Sans 3', sans-serif; outline: none;
}
.exp-note-cell input:focus { background: rgba(201,168,76,.07); color: var(--text); }

/* ── ACCOUNTING ── */
.agent-card { padding: 20px 24px; margin-bottom: 16px; }
.agent-name { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--gold); }
.agent-meta { font-size: .78rem; color: var(--muted); margin-top: 4px; }
.agent-pay-table { margin-top: 16px; }
.pay-total-row td { font-weight: 700; color: var(--green); border-top: 2px solid var(--border); }

/* ── MOBILE NAV ── */
.mobile-tabs {
  display: none; background: var(--surface);
  border-top: 1px solid var(--border);
  position: fixed; bottom: 0; left: 0; right: 0;
  justify-content: space-around; padding: 8px 0 16px; z-index: 100;
}
.mob-tab {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  border: none; background: none; color: var(--muted);
  font-family: 'Source Sans 3', sans-serif; font-size: .62rem; font-weight: 600;
  cursor: pointer; padding: 4px 12px; text-transform: uppercase; letter-spacing: .05em;
}
.mob-tab.active { color: var(--gold); }
.mob-icon { font-size: 1.2rem; }

@media (max-width: 768px) {
  .main-tabs { display: none; }
  .mobile-tabs { display: flex; }
  .content { padding: 16px 12px 80px; }
  .topbar { padding: 0 16px; }
  .form-grid { grid-template-columns: 1fr; }
  .form-group.full, .form-section { grid-column: span 1; }
  .exp-table { font-size: .75rem; }
  .exp-cat-cell { min-width: 120px; }
  .exp-input-cell { min-width: 65px; }
  .modal { padding: 20px 16px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">Alpha</div>
    <div class="main-tabs">
      <button class="main-tab active" onclick="showTab('deal')">Deal Control</button>
      <button class="main-tab" onclick="showTab('expense')">Expense Control</button>
      <button class="main-tab" onclick="showTab('accounting')">Accounting</button>
    </div>
    <div class="topbar-right">
      <button class="btn btn-gold btn-sm" onclick="exportToExcel()" title="Export all data to a formatted Excel report">📊 Export to Excel</button>
      <button class="btn btn-ghost btn-sm" onclick="exportData()">⬇ Backup</button>
      <label>
        <div class="btn btn-ghost btn-sm" style="cursor:pointer;">⬆ Restore</div>
        <input type="file" accept=".xlsx" style="display:none;" onchange="importData(event)">
      </label>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- ── DEAL CONTROL ── -->
    <div id="tab-deal" class="tab-panel active" style="background:#f0fdf4;min-height:100%;padding:16px;border-radius:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
        <div class="year-bar" id="deal-year-bar" style="margin-bottom:0;"></div>
        <button class="btn btn-gold" onclick="openAddDeal()">+ New Deal</button>
      </div>
      <div id="deal-content"></div>
    </div>

    <!-- ── EXPENSE CONTROL ── -->
    <div id="tab-expense" class="tab-panel" style="background:#fff0f3;min-height:100%;padding:16px;border-radius:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
        <div class="year-bar" id="exp-year-bar" style="margin-bottom:0;"></div>
      </div>
      <div id="expense-content"></div>
    </div>

    <!-- ── ACCOUNTING ── -->
    <div id="tab-accounting" class="tab-panel" style="background:#eff6ff;min-height:100%;padding:16px;border-radius:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="year-bar" id="acc-year-bar" style="margin-bottom:0;"></div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost" onclick="openAgentList()">👥 Agent List</button>
          <button class="btn btn-gold" onclick="openModal('modal-add-agent')">+ Add Agent</button>
        </div>
      </div>
      <div id="accounting-content"></div>
    </div>

  </div>
</div>

<!-- MOBILE TABS -->
<nav class="mobile-tabs">
  <button class="mob-tab active" onclick="showTab('deal');setMobTab(this)"><span class="mob-icon">📋</span>Deals</button>
  <button class="mob-tab" onclick="showTab('expense');setMobTab(this)"><span class="mob-icon">💸</span>Expenses</button>
  <button class="mob-tab" onclick="showTab('accounting');setMobTab(this)"><span class="mob-icon">📊</span>Accounting</button>
</nav>

<!-- ══════════ MODALS ══════════ -->

<!-- ADD / EDIT DEAL -->
<div class="modal-bg" id="modal-add-deal">
  <div class="modal">
    <div class="modal-title" id="deal-modal-title">New Deal</div>
    <input type="hidden" id="d-id">
    <div class="form-grid">
      <div class="form-section">Deal Info</div>
      <div class="form-group">
        <label>Status</label>
        <select id="d-status">
          <option value="in-process">In Process</option>
          <option value="op-pending">OP Pending</option>
          <option value="deal-close">Deal Close</option>
          <option value="dead-deal">Dead Deal</option>
          <option value="done-pay">Done / Pay Agent</option>
        </select>
      </div>
      <div class="form-group"><label>Deal Control #</label><input id="d-num" placeholder="0126001"></div>
      <div class="form-group"><label>Date</label><input id="d-date" type="date"></div>
      <div class="form-group"><label>Client Name</label><input id="d-client" placeholder="Full name"></div>
      <div class="form-group full"><label>Address</label><input id="d-address" placeholder="Street address"></div>
      <div class="form-group"><label>Apt #</label><input id="d-apt" placeholder="Apt 1A"></div>
      <div class="form-group"><label>MGMT</label><input id="d-mgmt" placeholder="Management co."></div>
      <div class="form-group"><label>BLDG Code</label><input id="d-bldg" placeholder="Building code"></div>
      <div class="form-group"><label>Move In Date</label><input id="d-movein" type="date"></div>

      <div class="form-section">Financial</div>
      <div class="form-group"><label>Rent ($)</label><input id="d-rent" type="number" placeholder="0.00"></div>
      <div class="form-group"><label>FEE ($)</label><input id="d-fee" type="number" placeholder="0.00"></div>
      <div class="form-group"><label>Fee Paid On</label><input id="d-fee-paid-on" type="date"></div>
      <div class="form-group"><label>Fee Paid By Client ($)</label><input id="d-fee-by-client" type="number" placeholder="0.00"></div>
      <div class="form-group"><label>Op Paid By MGMT ($)</label><input id="d-op-mgmt" type="number" placeholder="0.00"></div>
      <div class="form-group"><label>Agent</label><input id="d-agent" placeholder="Agent name"></div>
      <div class="form-group"><label>Gross COMM ($)</label><input id="d-gross" type="number" placeholder="0.00"></div>
      <div class="form-group"><label>TIP ($)</label><input id="d-tip" type="number" placeholder="0.00"></div>
      <div class="form-group"><label>TIP Reimbursed ($)</label><input id="d-tip-reimb" type="number" placeholder="0.00"></div>
      <div class="form-group"><label>NET ($)</label><input id="d-net" type="number" placeholder="0.00"></div>
      <div class="form-group"><label>Agent 1 Pay ($)</label><input id="d-agent-pay" type="number" placeholder="0.00"></div>
      <div class="form-group"><label>Check # (1)</label><input id="d-check" placeholder="Check number"></div>
      <div class="form-group"><label>Agent 2 Pay ($)</label><input id="d-agent2-pay" type="number" placeholder="0.00"></div>
      <div class="form-group"><label>Check # (2)</label><input id="d-check2" placeholder="Check number"></div>
      <div class="form-group"><label>DOSE</label><input id="d-dose" placeholder="DOSE"></div>

      <div class="form-section">Tenant Info</div>
      <div class="form-group"><label>Tenant Phone</label><input id="d-tenant-phone" type="tel" placeholder="(555) 000-0000"></div>
      <div class="form-group"><label>Tenant Email</label><input id="d-tenant-email" type="email" placeholder="tenant@email.com"></div>
      <div class="form-group full"><label>Notes</label><textarea id="d-notes" placeholder="Any additional notes..."></textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-add-deal')">Cancel</button>
      <button class="btn btn-gold" id="save-deal-btn" onclick="saveDeal()">Save Deal</button>
    </div>
  </div>
</div>

<!-- VIEW / EDIT DEAL -->
<div class="modal-bg" id="modal-view-deal">
  <div class="modal" style="max-width:800px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div class="modal-title" id="view-deal-title" style="margin-bottom:0;"></div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost btn-sm" onclick="editCurrentDeal()">✏️ Edit</button>
        <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-view-deal')">✕</button>
      </div>
    </div>
    <div id="deal-view-body"></div>
  </div>
</div>

<!-- ADD AGENT -->
<div class="modal-bg" id="modal-add-agent">
  <div class="modal" style="max-width:480px;">
    <div class="modal-title">Add Agent</div>
    <div class="form-grid">
      <div class="form-group full"><label>Full Name</label><input id="ag-name" placeholder="First Last"></div>
      <div class="form-group full"><label>Address</label><input id="ag-address" placeholder="Street address"></div>
      <div class="form-group"><label>Started</label><input id="ag-started" type="date"></div>
      <div class="form-group"><label>SS #</label><input id="ag-ss" placeholder="XXX-XX-XXXX"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-add-agent')">Cancel</button>
      <button class="btn btn-gold" onclick="saveAgent()">Add Agent</button>
    </div>
  </div>
</div>

<!-- ADD PAYMENT -->
<div class="modal-bg" id="modal-add-payment">
  <div class="modal" style="max-width:400px;">
    <div class="modal-title">Add Payment</div>
    <input type="hidden" id="pay-agent-id">
    <div class="form-grid">
      <div class="form-group"><label>Date</label><input id="pay-date" type="date"></div>
      <div class="form-group"><label>Check #</label><input id="pay-check" placeholder="Check number"></div>
      <div class="form-group full"><label>Amount ($)</label><input id="pay-amount" type="number" placeholder="0.00"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-add-payment')">Cancel</button>
      <button class="btn btn-gold" onclick="savePayment()">Add Payment</button>
    </div>
  </div>
</div>

<!-- EDIT AGENT -->
<div class="modal-bg" id="modal-edit-agent">
  <div class="modal" style="max-width:480px;">
    <div class="modal-title">Edit Agent</div>
    <input type="hidden" id="edit-ag-id">
    <div class="form-grid">
      <div class="form-group full"><label>Full Name</label><input id="edit-ag-name" placeholder="First Last"></div>
      <div class="form-group full"><label>Address</label><input id="edit-ag-address" placeholder="Street address"></div>
      <div class="form-group"><label>Started</label><input id="edit-ag-started" type="date"></div>
      <div class="form-group"><label>SS #</label><input id="edit-ag-ss" placeholder="XXX-XX-XXXX"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-edit-agent')">Cancel</button>
      <button class="btn btn-gold" onclick="saveEditAgent()">Save Changes</button>
    </div>
  </div>
</div>

<!-- AGENT LIST -->

function showSync(icon, msg) {
  let el = document.getElementById('_sync_toast');
  if (!el) {
    el = document.createElement('div');
    el.id = '_sync_toast';
    el.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#1e1e24;border:1px solid #32323c;border-radius:50px;padding:8px 18px;font-size:.8rem;font-weight:600;color:#edeae2;z-index:9999;display:flex;align-items:center;gap:7px;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:opacity .3s;';
    document.body.appendChild(el);
  }
  el.style.opacity = '1';
  el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

let _saveTimer = null;
function saveDB() {
  localStorage.setItem('alpha-db', JSON.stringify(db));

  _saveTimer = setTimeout(cloudSave, 700);

async function cloudSave() {
  showSync('⏳', 'Saving…');
  try {
    // Use upsert so deletions always overwrite cloud — PATCH can silently fail if row is missing
    await fetch(`${SUPA_URL}/rest/v1/alpha_data`, {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify({ id: 'main', data: db, updated_at: new Date().toISOString() })
    });
    showSync('✅', 'Saved!');
  } catch(e) { showSync('⚠️', 'Offline – saved locally'); }
}

async function cloudLoad() {
  showSync('⏳', 'Loading…');
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/alpha_data?id=eq.main&select=data`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
    });
    const rows = await res.json();
    if (rows && rows[0] && rows[0].data) {
      const cloud = rows[0].data;
      // Always trust cloud data — it is the source of truth (including deletions)
      db = cloud;
      localStorage.setItem('alpha-db', JSON.stringify(db));
      showSync('✅', 'Loaded!');
    } else {
      // Nothing in cloud yet — push local data up
      showSync('⏳', 'Syncing local data to cloud…');
      await cloudSave();
    }
  } catch(e) { showSync('⚠️', 'Using local data'); }
  // Always ensure all fields exist
  if (!db.deals) db.deals = [];

function getExpKey(year, rowIdx, monthIdx) {
  return `exp_${year}_${rowIdx}_${monthIdx}`;
}
function getExpNoteKey(year, rowIdx, monthIdx) {
  return `expnote_${year}_${rowIdx}_${monthIdx}`;
}

function saveExpNote(year, rowIdx, monthIdx, value) {
  const key = getExpNoteKey(year, rowIdx, monthIdx);
  if (value && value.trim()) db.expenses[key] = value.trim();
  else delete db.expenses[key];
  saveDB();
}

function saveExpCell(year, rowIdx, monthIdx, value) {
  const key = getExpKey(year, rowIdx, monthIdx);
  const val = parseFloat(value);
  if (!isNaN(val) && val > 0) db.expenses[key] = val;
  else delete db.expenses[key];
  saveDB();
  updateExpTotals(year, rowIdx, monthIdx);
}

function updateExpTotals(year, rowIdx, monthIdx) {
  // Row total
  let rowTotal = 0;
  for (let m = 0; m < 12; m++) rowTotal += db.expenses[getExpKey(year, rowIdx, m)] || 0;
  const rtEl = document.getElementById(`exp-rowtotal-${year}-${rowIdx}`);
  if (rtEl) rtEl.textContent = rowTotal > 0 ? fmtMoney(rowTotal) : '—';

  // Column total
  let colTotal = 0;
  for (let r = 0; r < EXP_ROWS.length; r++) colTotal += db.expenses[getExpKey(year, r, monthIdx)] || 0;
  const ctEl = document.getElementById(`exp-coltotal-${year}-${monthIdx}`);
  if (ctEl) ctEl.textContent = colTotal > 0 ? fmtMoney(colTotal) : '—';

  // Grand total
  let grand = 0;
  for (let r = 0; r < EXP_ROWS.length; r++)
    for (let m = 0; m < 12; m++)
      grand += db.expenses[getExpKey(year, r, m)] || 0;
  const gtEl = document.getElementById(`exp-grand-${year}`);
  if (gtEl) gtEl.textContent = grand > 0 ? fmtMoney(grand) : '—';
}

function renderExpenses() {
  renderExpYearBar();
  const content = document.getElementById('expense-content');
  const y = activeExpYear;

  // Header row: Category | Jan | Feb | ... | Dec | Total
  let html = `<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
  <table class="exp-table">
    <thead><tr>
      <th>Category</th>
      ${MONTHS_SHORT.map(m => `<th>${m}</th>`).join('')}
      <th>Total</th>
    </tr></thead>
    <tbody>`;

  // One row per expense category + notes row
  EXP_ROWS.forEach((row, ri) => {
    let rowTotal = 0;
    for (let m = 0; m < 12; m++) rowTotal += db.expenses[getExpKey(y, ri, m)] || 0;

    html += `<tr>
      <td class="exp-cat-cell">${row}</td>`;

    for (let mi = 0; mi < 12; mi++) {
      const key = getExpKey(y, ri, mi);
      const val = db.expenses[key] || '';
      html += `<td class="exp-input-cell">
        <input type="number" min="0" step="0.01" value="${val}" placeholder=""
          onchange="saveExpCell(${y},${ri},${mi},this.value)"
          id="exp-cell-${y}-${ri}-${mi}">
      </td>`;
    }

    html += `<td class="exp-row-total" id="exp-rowtotal-${y}-${ri}">${rowTotal > 0 ? fmtMoney(rowTotal) : '—'}</td>
    </tr>`;

    // Notes row below each category
    html += `<tr class="exp-note-row">
      <td class="exp-note-label">↳ notes</td>`;
    for (let mi = 0; mi < 12; mi++) {
      const noteKey = getExpNoteKey(y, ri, mi);
      const noteVal = (db.expenses[noteKey] || '').replace(/"/g, '&quot;');
      html += `<td class="exp-note-cell" colspan="1">
        <input type="text" value="${noteVal}" placeholder="…"
          onchange="saveExpNote(${y},${ri},${mi},this.value)"
          id="exp-note-${y}-${ri}-${mi}">
      </td>`;
    }
    html += `<td class="exp-note-cell"></td></tr>`;
  });

  // Footer: monthly column totals
  html += `</tbody><tfoot><tr>
    <td class="exp-footer-label">Monthly Total</td>`;

  let grand = 0;
  for (let mi = 0; mi < 12; mi++) {
    let colTotal = 0;
    for (let ri = 0; ri < EXP_ROWS.length; ri++) {
      const v = db.expenses[getExpKey(y, ri, mi)] || 0;
      colTotal += v;
      grand += v;
    }
    html += `<td class="exp-col-total" id="exp-coltotal-${y}-${mi}">${colTotal > 0 ? fmtMoney(colTotal) : '—'}</td>`;
  }

  html += `<td class="exp-grand-cell" id="exp-grand-${y}">${grand > 0 ? fmtMoney(grand) : '—'}</td>
  </tr></tfoot></table></div>`;

  content.innerHTML = html;
}

// ══════════ ACCOUNTING ══════════
function renderAccYearBar() {
  const bar = document.getElementById('acc-year-bar');
  bar.innerHTML = db.accYears.map(y =>
    `<button class="year-btn ${y === activeAccYear ? 'active' : ''}" onclick="setAccYear(${y})">${y}</button>`
  ).join('') + `<button class="add-year-btn" onclick="addAccYear()">+ Year</button>`;
}

function setAccYear(y) {
  activeAccYear = y;
  renderAccYearBar();
  renderAccounting();
}

function addAccYear() {
  const next = Math.max(...db.accYears) + 1;
  db.accYears.push(next);
  saveDB();
  setAccYear(next);
}

function renderAccounting() {
  renderAccYearBar();
  const content = document.getElementById('accounting-content');
  if (db.agents.length === 0) {
    content.innerHTML = `<div class="card" style="padding:40px;text-align:center;color:var(--muted);">
      <div style="font-size:2rem;margin-bottom:10px;">👤</div>
      <div>No agents yet. Click <strong>+ Add Agent</strong> to create one.</div>
    </div>`;
    return;
  }

  content.innerHTML = db.agents.map(agent => {
    const payments = (agent.payments || []).filter(p => {
      if (!p.date) return true;
      return new Date(p.date).getFullYear() === activeAccYear;
    }).sort((a,b) => (a.date||'').localeCompare(b.date||''));

    const total = payments.reduce((s,p) => s + (parseFloat(p.amount)||0), 0);

    const payRows = payments.map(p => `<tr>
      <td>${fmtDate(p.date)}</td>
      <td>${p.check || '—'}</td>
      <td style="color:var(--green);font-weight:600;">${fmtMoney(parseFloat(p.amount)||0)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deletePayment('${agent.id}','${p.id}')">✕</button></td>
    </tr>`).join('');

    const totalRow = payments.length > 0 ? `<tr class="pay-total-row">
      <td colspan="2" style="font-weight:700;color:var(--gold);">Total ${activeAccYear}</td>
      <td style="color:var(--green);font-weight:700;">${fmtMoney(total)}</td>
      <td></td>
    </tr>` : '';

    return `<div class="card agent-card" style="margin-bottom:16px;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <div>
          <div class="agent-name" style="cursor:pointer;display:inline-flex;align-items:center;gap:8px;" onclick="toggleAgentDetails('${agent.id}')">
            ${agent.name}
            <span style="font-size:.7rem;color:var(--muted);font-family:'Source Sans 3',sans-serif;font-weight:400;" id="agent-toggle-hint-${agent.id}">▶ show details</span>
          </div>
          <div class="agent-meta" id="agent-details-${agent.id}" style="display:none;margin-top:6px;">
            ${agent.address ? `<span>📍 ${agent.address}</span>` : ''}
            ${agent.address && agent.ss ? ' · ' : ''}
            ${agent.ss ? `<span>SS#: ${agent.ss}</span>` : ''}
            ${agent.started ? ` · Started: ${fmtDate(agent.started)}` : ''}
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost btn-sm" onclick="openEditAgent('${agent.id}')">✏️ Edit</button>
          <button class="btn btn-gold btn-sm" onclick="openAddPayment('${agent.id}')">+ Payment</button>
          <button class="btn btn-danger btn-sm" onclick="deleteAgent('${agent.id}')">🗑</button>
        </div>
      </div>
      <div class="agent-pay-table">
        <table>
          <thead><tr><th>Date</th><th>Check #</th><th>Amount</th><th></th></tr></thead>
          <tbody>
            ${payRows || `<tr><td colspan="4" style="color:var(--muted);text-align:center;padding:16px;">No payments for ${activeAccYear}</td></tr>`}
            ${totalRow}
          </tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

function saveAgent() {
  const name = document.getElementById('ag-name').value.trim();
  if (!name) { alert('Please enter agent name.'); return; }
  db.agents.push({
    id: 'ag-' + Date.now(),
    name,
    address: document.getElementById('ag-address').value.trim(),
    started: document.getElementById('ag-started').value,
    ss: document.getElementById('ag-ss').value.trim(),
    payments: []
  });
  saveDB();
  closeModal('modal-add-agent');
  renderAccounting();
}

function deleteAgent(id) {
  if (!confirm('Delete this agent and all their payments?')) return;
  db.agents = db.agents.filter(a => a.id !== id);
  saveDB(); renderAccounting();
}

function openAddPayment(agentId) {
  document.getElementById('pay-agent-id').value = agentId;
  document.getElementById('pay-date').value = todayStr();
  document.getElementById('pay-check').value = '';
  document.getElementById('pay-amount').value = '';
  openModal('modal-add-payment');
}

function savePayment() {
  const agentId = document.getElementById('pay-agent-id').value;
  const agent = db.agents.find(a => a.id === agentId);
  if (!agent) return;
  const amount = parseFloat(document.getElementById('pay-amount').value);
  if (!amount) { alert('Please enter an amount.'); return; }
  if (!agent.payments) agent.payments = [];
  agent.payments.push({
    id: 'pay-' + Date.now(),
    date: document.getElementById('pay-date').value,
    check: document.getElementById('pay-check').value.trim(),
    amount
  });
  saveDB();
  closeModal('modal-add-payment');
  renderAccounting();
}

function deletePayment(agentId, payId) {
  const agent = db.agents.find(a => a.id === agentId);
  if (!agent) return;
  agent.payments = agent.payments.filter(p => p.id !== payId);
  saveDB(); renderAccounting();
}

function toggleAgentDetails(agentId) {
  const details = document.getElementById('agent-details-' + agentId);
  const hint = document.getElementById('agent-toggle-hint-' + agentId);
  if (!details) return;
  if (details.style.display === 'none') {
    details.style.display = 'block';
    hint.textContent = '▼ hide details';
  } else {
    details.style.display = 'none';
    hint.textContent = '▶ show details';
  }
}

function openEditAgent(agentId) {
  const agent = db.agents.find(a => a.id === agentId);
  if (!agent) return;
  document.getElementById('edit-ag-id').value = agent.id;
  document.getElementById('edit-ag-name').value = agent.name || '';
  document.getElementById('edit-ag-address').value = agent.address || '';
  document.getElementById('edit-ag-started').value = agent.started || '';
  document.getElementById('edit-ag-ss').value = agent.ss || '';
  openModal('modal-edit-agent');
}

function saveEditAgent() {
  const id = document.getElementById('edit-ag-id').value;
  const agent = db.agents.find(a => a.id === id);
  if (!agent) return;
  const name = document.getElementById('edit-ag-name').value.trim();
  if (!name) { alert('Please enter agent name.'); return; }
  agent.name = name;
  agent.address = document.getElementById('edit-ag-address').value.trim();
  agent.started = document.getElementById('edit-ag-started').value;
  agent.ss = document.getElementById('edit-ag-ss').value.trim();
  saveDB();
  closeModal('modal-edit-agent');
  renderAccounting();
}

function openAgentList() {
  const tbody = document.getElementById('agent-list-tbody');
  tbody.innerHTML = db.agents.length === 0
    ? `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:20px;">No agents added yet.</td></tr>`
    : db.agents.map(a => `<tr>
        <td style="font-weight:600;color:var(--gold);">${a.name}</td>
        <td>${a.address || '—'}</td>
        <td>${a.ss || '—'}</td>
        <td>${a.started ? fmtDate(a.started) : '—'}</td>
      </tr>`).join('');
  openModal('modal-agent-list');
}

// ══════════ EXPORT TO EXCEL (3 TABS: Deals Control, Expense Control, Accounting) ══════════
function exportToExcel() {
  const wb = XLSX.utils.book_new();

  // ── HELPER: apply column widths ──
  function setColWidths(ws, widths) {
    ws['!cols'] = widths.map(w => ({ wch: w }));
  }

  // ── HELPER: style header row (bold, gold background) ──
  // SheetJS community edition doesn't support cell styles, but we can set freeze panes and col widths.

  // ══ TAB 1: DEALS CONTROL ══
  // Sort all deals: by year desc, then month asc, then deal number
  const allDeals = [...db.deals].sort((a, b) => {
    const da = a.date || '', db2 = b.date || '';
    if (da < db2) return -1;
    if (da > db2) return 1;
    return String(a.num||'').localeCompare(String(b.num||''));
  });

  const STATUS_LABELS = {
    'in-process': 'In Process',
    'op-pending':  'OP Pending',
    'deal-close':  'Deal Close',
    'dead-deal':   'Dead Deal',
    'done-pay':    'Done / Pay Agent',
  };

  // Build deals rows — one deal = one row, all fields in logical order
  const dealHeaders = [
    'Deal Control #', 'Date', 'Status', 'Client Name',
    'Address', 'Apt', 'MGMT', 'BLDG Code',
    'Move-In Date', 'Rent ($)', 'FEE ($)', 'Fee Paid On',
    'Fee Paid By Client ($)', 'Op Paid By MGMT ($)',
    'Agent', 'Gross COMM ($)', 'TIP ($)', 'TIP Reimbursed ($)', 'NET ($)',
    'Agent Pay 1 ($)', 'Check # 1',
    'Agent Pay 2 ($)', 'Check # 2',
    'DOSE', 'Tenant Phone', 'Tenant Email', 'Notes'
  ];

  const dealData = allDeals.map(d => [
    d.num || '',
    d.date || '',
    STATUS_LABELS[d.status] || d.status || '',
    d.client || '',
    d.address || '',
    d.apt || '',
    d.mgmt || '',
    d.bldg || '',
    d.movein || '',
    d.rent ? Number(d.rent) : '',
    d.fee ? Number(d.fee) : '',
    d.feePaidOn || '',
    d.feeByClient ? Number(d.feeByClient) : '',
    d.opMgmt ? Number(d.opMgmt) : '',
    d.agent || '',
    d.gross ? Number(d.gross) : '',
    d.tip ? Number(d.tip) : '',
    d.tipReimb ? Number(d.tipReimb) : '',
    d.net ? Number(d.net) : '',
    d.agentPay ? Number(d.agentPay) : '',
    d.check || '',
    d.agent2Pay ? Number(d.agent2Pay) : '',
    d.check2 || '',
    d.dose || '',
    d.tenantPhone || '',
    d.tenantEmail || '',
    d.notes || ''
  ]);

  const dealsSheet = XLSX.utils.aoa_to_sheet([dealHeaders, ...dealData]);
  dealsSheet['!freeze'] = { xSplit: 0, ySplit: 1 }; // freeze header row
  setColWidths(dealsSheet, [14,12,16,20,28,6,18,10,12,10,10,12,18,18,16,14,10,16,10,14,10,14,10,10,14,24,30]);
  XLSX.utils.book_append_sheet(wb, dealsSheet, 'Deals Control');

  // ══ TAB 2: EXPENSE CONTROL ══
  // Rows: category x months, with notes row, plus column totals
  // Format: Category | Jan | Feb | ... | Dec | Annual Total
  const allExpYears = [...db.expenseYears].sort();

  // Build one block per year separated by a blank row + year header
  const expRows = [];
  allExpYears.forEach(y => {
    // Year label row
    expRows.push([`── ${y} ──`, ...MONTHS_SHORT.map(m => `${m} ${y}`), 'Annual Total']);

    EXP_ROWS.forEach((cat, ri) => {
      const monthVals = [];
      let rowTotal = 0;
      for (let mi = 0; mi < 12; mi++) {
        const v = db.expenses[getExpKey(y, ri, mi)] || 0;
        monthVals.push(v > 0 ? v : '');
        rowTotal += v;
      }
      expRows.push([cat, ...monthVals, rowTotal > 0 ? rowTotal : '']);

      // Notes row
      const noteVals = MONTHS_SHORT.map((_, mi) => {
        const note = db.expenses[getExpNoteKey(y, ri, mi)] || '';
        return note;
      });
      const hasAnyNote = noteVals.some(n => n);
      if (hasAnyNote) {
        expRows.push([`  ↳ notes`, ...noteVals, '']);
      }
    });

    // Column totals row
    const colTotals = [];
    for (let mi = 0; mi < 12; mi++) {
      let col = 0;
      for (let ri = 0; ri < EXP_ROWS.length; ri++) col += db.expenses[getExpKey(y, ri, mi)] || 0;
      colTotals.push(col > 0 ? col : '');
    }
    const grandTotal = allExpYears.length > 0 ? (() => {
      let g = 0;
      for (let ri = 0; ri < EXP_ROWS.length; ri++)
        for (let mi = 0; mi < 12; mi++) g += db.expenses[getExpKey(y, ri, mi)] || 0;
      return g > 0 ? g : '';
    })() : '';
    expRows.push(['MONTHLY TOTAL', ...colTotals, grandTotal]);
    expRows.push([]); // blank separator between years
  });

  const expHeaders = ['Category', ...MONTHS_SHORT, 'Annual Total'];
  const expSheet = XLSX.utils.aoa_to_sheet([expHeaders, ...expRows]);
  expSheet['!freeze'] = { xSplit: 1, ySplit: 1 }; // freeze category column + header
  setColWidths(expSheet, [22, 9,9,9,9,9,9,9,9,9,9,9,9, 14]);
  XLSX.utils.book_append_sheet(wb, expSheet, 'Expense Control');

  // ══ TAB 3: ACCOUNTING ══
  // Section 1: Agent payments — each payment on its own row
  // Section 2: Summary — agent totals per year
  const accRows = [];

  // ── Agent Payments Detail ──
  accRows.push(['AGENT PAYMENTS DETAIL']);
  accRows.push(['Agent Name', 'SS #', 'Address', 'Started', 'Year', 'Payment Date', 'Check #', 'Amount ($)']);

  db.agents.forEach(agent => {
    const payments = [...(agent.payments || [])].sort((a,b) => (a.date||'').localeCompare(b.date||''));
    if (payments.length === 0) {
      accRows.push([agent.name, agent.ss||'', agent.address||'', agent.started||'', '', '—', '—', '']);
    } else {
      payments.forEach((p, i) => {
        const yr = p.date ? new Date(p.date).getFullYear() : '';
        accRows.push([
          i === 0 ? agent.name : '',           // agent name only on first row
          i === 0 ? (agent.ss || '') : '',
          i === 0 ? (agent.address || '') : '',
          i === 0 ? (agent.started || '') : '',
          yr,
          p.date || '',
          p.check || '',
          parseFloat(p.amount) || 0
        ]);
      });
      // Agent subtotal row
      const agTotal = payments.reduce((s,p) => s + (parseFloat(p.amount)||0), 0);
      accRows.push(['', '', '', '', '', '', `${agent.name} — TOTAL`, agTotal]);
    }
    accRows.push([]); // blank row between agents
  });

  // ── Summary by Agent & Year ──
  accRows.push([]);
  accRows.push(['SUMMARY — TOTAL PAID PER AGENT PER YEAR']);

  const allAccYears = [...new Set(
    db.agents.flatMap(a => (a.payments||[]).map(p => p.date ? new Date(p.date).getFullYear() : null).filter(Boolean))
  )].sort();

  if (allAccYears.length > 0) {
    accRows.push(['Agent', ...allAccYears.map(y => `${y} Total ($)`), 'Grand Total ($)']);
    db.agents.forEach(agent => {
      const yearTotals = allAccYears.map(y =>
        (agent.payments||[]).filter(p => p.date && new Date(p.date).getFullYear() === y)
          .reduce((s,p) => s + (parseFloat(p.amount)||0), 0)
      );
      const grandTotal = yearTotals.reduce((s,v) => s+v, 0);
      accRows.push([agent.name, ...yearTotals.map(v => v||''), grandTotal||'']);
    });

    // Year column totals
    const yearColTotals = allAccYears.map(y =>
      db.agents.reduce((s, agent) =>
        s + (agent.payments||[]).filter(p => p.date && new Date(p.date).getFullYear() === y)
              .reduce((s2,p) => s2 + (parseFloat(p.amount)||0), 0), 0)
    );
    const overallTotal = yearColTotals.reduce((s,v) => s+v, 0);
    accRows.push(['TOTAL ALL AGENTS', ...yearColTotals.map(v => v||''), overallTotal||'']);
  }

  const accSheet = XLSX.utils.aoa_to_sheet(accRows);
  accSheet['!freeze'] = { xSplit: 0, ySplit: 2 };
  setColWidths(accSheet, [22, 12, 26, 12, 8, 12, 14, 14, ...allAccYears.map(() => 14), 14]);
  XLSX.utils.book_append_sheet(wb, accSheet, 'Accounting');

  // ── Download ──
  const fileName = `Alpha-Report-${todayStr()}.xlsx`;
  XLSX.writeFile(wb, fileName);
  showSync('✅', `Exported: ${fileName}`);
}

    FeeByClient:d.feeByClient, OpMgmt:d.opMgmt, Agent:d.agent,
    GrossComm:d.gross, Tip:d.tip, TipReimb:d.tipReimb, Net:d.net,
    AgentPay:d.agentPay, CheckNum:d.check, Agent2Pay:d.agent2Pay, Check2:d.check2,
    Dose:d.dose, Notes:d.notes,
    TenantPhone:d.tenantPhone, TenantEmail:d.tenantEmail
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dealRows.length ? dealRows : [{}]), 'Deals');

  // Agents
  const agentRows = db.agents.map(a => ({ID:a.id,Name:a.name,Address:a.address,Started:a.started,SS:a.ss}));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(agentRows.length ? agentRows : [{}]), 'Agents');

  // Payments
  const payRows = db.agents.flatMap(a => (a.payments||[]).map(p => ({AgentID:a.id,PayID:p.id,Date:p.date,Check:p.check,Amount:p.amount})));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(payRows.length ? payRows : [{}]), 'Payments');

  // Config
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([{
    DealYears: db.dealYears.join(','),
    ExpenseYears: db.expenseYears.join(','),
    AccYears: db.accYears.join(',')
  }]), 'Config');

  XLSX.writeFile(wb, `Alpha-Backup-${todayStr()}.xlsx`);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!confirm('Restore from this file? This will replace ALL current data.')) { event.target.value=''; return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const sheet = n => { const ws=wb.Sheets[n]; return ws ? XLSX.utils.sheet_to_json(ws).filter(r=>Object.keys(r).length>1) : []; };

      const deals = sheet('Deals').map(r => ({
        id:String(r.ID||''), status:r.Status||'in-process', num:String(r.DealNum||''),
        date:r.Date||'', client:r.Client||'', address:r.Address||'', apt:String(r.Apt||''),
        mgmt:r.MGMT||'', bldg:String(r.BLDGCode||''), movein:r.MoveIn||'',
        rent:r.Rent||'', fee:r.Fee||'', feePaidOn:r.FeePaidOn||'',
        feeByClient:r.FeeByClient||'', opMgmt:r.OpMgmt||'', agent:r.Agent||'',
        gross:r.GrossComm||'', tip:r.Tip||'', tipReimb:r.TipReimb||'',
        net:r.Net||'', agentPay:r.AgentPay||'', check:String(r.CheckNum||''),
        agent2Pay:r.Agent2Pay||'', check2:String(r.Check2||''),
        dose:r.Dose||'', notes:r.Notes||'',
        tenantPhone:String(r.TenantPhone||''), tenantEmail:r.TenantEmail||''
      })).filter(d => d.id);

      const expenses = {};
      sheet('Expenses').forEach(r => { if(r.Key) expenses[r.Key] = Number(r.Value)||0; });

      const agentMap = {};
      sheet('Agents').forEach(r => {
        if (!r.ID) return;
        agentMap[String(r.ID)] = { id:String(r.ID), name:r.Name||'', address:r.Address||'', started:r.Started||'', ss:String(r.SS||''), payments:[] };
      });
      sheet('Payments').forEach(r => {
        const ag = agentMap[String(r.AgentID||'')];
        if (ag) ag.payments.push({id:String(r.PayID||'pay-'+Date.now()),date:r.Date||'',check:String(r.Check||''),amount:Number(r.Amount)||0});
      });

      const cfg = sheet('Config')[0] || {};
      const parseYears = s => s ? String(s).split(',').map(Number).filter(Boolean) : [2026];

      db = {
        deals,
        expenses,
        agents: Object.values(agentMap),
        dealYears: parseYears(cfg.DealYears),
        expenseYears: parseYears(cfg.ExpenseYears),
        accYears: parseYears(cfg.AccYears),
      };
      saveDB();
      activeDealYear = db.dealYears[0];
      activeExpYear = db.expenseYears[0];
      activeAccYear = db.accYears[0];
      renderDeals();
      renderExpenses();
      renderAccounting();
      alert(`✅ Restored! ${deals.length} deals, ${Object.values(agentMap).length} agents.`);
    } catch(err) { alert('Failed to import: ' + err.message); }
    event.target.value = '';
  };
  reader.readAsBinaryString(file);
}

// ══════════ UTILS ══════════
function todayStr() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'});
}
function fmtMoney(n) {
  if (!n && n !== 0) return '—';
  return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

// ══════════ INIT ══════════
document.getElementById('d-date').value = todayStr();
cloudLoad().then(() => {
  activeDealYear = db.dealYears[db.dealYears.length - 1] || 2026;
  activeExpYear = db.expenseYears[db.expenseYears.length - 1] || 2026;
  activeAccYear = db.accYears[db.accYears.length - 1] || 2026;
  renderDeals();
});
</script>
